services:
  api:
    image: ${ASSTRACK_API_IMAGE:-ghcr.io/jerrettdavis/asstrack-api:latest}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Data Source=/data/asstrack.db"
      Auth__ApiKey: ${ASSTRACK_API_KEY:?ASSTRACK_API_KEY must be set in .env or environment before starting.}
      Auth__AdminApiKey: ${ASSTRACK_ADMIN_API_KEY:-}
      Auth__IngestApiKey: ${ASSTRACK_INGEST_API_KEY:-}
      Auth__AccessTier: ${ASSTRACK_ACCESS_TIER:-enterprise}
      Cors__AllowedOrigins__0: "http://localhost:5174"
    volumes:
      - asstrack-data:/data
    ports:
      - "5019:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ${ASSTRACK_FRONTEND_IMAGE:-ghcr.io/jerrettdavis/asstrack-frontend:latest}
    environment:
      ASSTRACK_API_KEY: ${ASSTRACK_API_KEY:?ASSTRACK_API_KEY must be set}
    ports:
      - "5174:80"
    depends_on:
      - api

  bridge-gateway:
    image: ${ASSTRACK_BRIDGE_GATEWAY_IMAGE:-ghcr.io/jerrettdavis/asstrack-bridge-gateway:latest}
    profiles: ["integrations"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      BridgeGateway__AssTrackBaseUrl: "http://api:8080"
      BridgeGateway__IngestApiKey: ${ASSTRACK_BRIDGE_INGEST_API_KEY:-}
      BridgeGateway__DryRun: ${ASSTRACK_BRIDGE_DRY_RUN:-false}
      BridgeGateway__Feeds__generic__Enabled: ${ASSTRACK_BRIDGE_GENERIC_ENABLED:-false}
      BridgeGateway__Feeds__generic__FeedId: ${ASSTRACK_BRIDGE_GENERIC_FEED_ID:-00000000-0000-0000-0000-000000000000}
      BridgeGateway__Feeds__generic__Provider: "generic-webhook"
      BridgeGateway__Feeds__generic__SharedSecret: ${ASSTRACK_BRIDGE_GENERIC_SECRET:-}
      BridgeGateway__Feeds__generic__DefaultTags: "bridge, generic"
    ports:
      - "5056:8080"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  asstrack-data:
