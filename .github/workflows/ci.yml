name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (unit + integration)
        run: dotnet test --no-build -c Release --filter "Category!=E2E" tests/AssTrack.Tests/AssTrack.Tests.csproj
        # E2E tests (Reqnroll + Playwright) require a real browser and running processes.
        # Run them locally with: .\tests\run-e2e.ps1

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install
        run: npm ci --prefix frontend

      - name: Build
        run: npm run build --prefix frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/AssTrack.Api/Dockerfile -t asstrack-api:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t asstrack-frontend:ci frontend

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Restore .NET
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore -c Release

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('tests/AssTrack.E2ETests/AssTrack.E2ETests.csproj') }}
          restore-keys: playwright-chromium-

      - name: Run E2E tests
        run: dotnet test tests/AssTrack.E2ETests/AssTrack.E2ETests.csproj --no-build -c Release --logger "console;verbosity=normal"
        env:
          E2E_BACKEND_PORT: "5099"
          E2E_FRONTEND_PORT: "5174"
