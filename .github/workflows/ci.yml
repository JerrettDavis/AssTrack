name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 22

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Restore
        run: dotnet restore AssTrack.sln

      - name: Build
        run: dotnet build AssTrack.sln --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Test with coverage
        run: >
          dotnet test tests/AssTrack.Tests/AssTrack.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=unit-tests.trx"
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Install ReportGenerator
        run: dotnet tool update -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        shell: bash
        run: |
          REPORTS=$(find tests -type f -path "*/TestResults/*/coverage.cobertura.xml" | tr '\n' ';')
          reportgenerator \
            -reports:"$REPORTS" \
            -targetdir:"coverage-report" \
            -reporttypes:"HtmlInline;Cobertura;TextSummary;lcov" \
            -assemblyfilters:"+AssTrack*;-*.Tests"
          echo "COVERAGE_SUMMARY<<EOF" >> "$GITHUB_ENV"
          cat coverage-report/Summary.txt >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: |
            tests/**/TestResults/**/*.trx
            tests/**/TestResults/**/coverage.cobertura.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report

      - name: Add coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          recreate: true
          message: |
            ## AssTrack Coverage
            ```
            ${{ env.COVERAGE_SUMMARY }}
            ```

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage-report/Cobertura.xml
          flags: backend
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --prefix frontend

      - name: Build
        run: npm run build --prefix frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build API image
        run: docker build -f src/AssTrack.Api/Dockerfile -t asstrack-api:ci .

      - name: Build bridge gateway image
        run: docker build -f src/AssTrack.BridgeGateway/Dockerfile -t asstrack-bridge-gateway:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t asstrack-frontend:ci frontend

  e2e:
    name: E2E Managed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore .NET
        run: dotnet restore AssTrack.sln

      - name: Build solution
        run: dotnet build AssTrack.sln --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright Chromium
        run: pwsh tests/AssTrack.E2ETests/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Run E2E tests
        run: >
          dotnet test tests/AssTrack.E2ETests/AssTrack.E2ETests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=e2e-tests.trx"
        env:
          E2E_BACKEND_PORT: "5099"
          E2E_FRONTEND_PORT: "5174"

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-managed-test-results
          path: tests/**/TestResults/**/*.trx

  e2e-apphost:
    name: E2E AppHost
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore .NET
        run: dotnet restore AssTrack.sln

      - name: Build solution
        run: dotnet build AssTrack.sln --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Install Playwright Chromium
        run: pwsh tests/AssTrack.E2ETests/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Run E2E tests through AppHost
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/AssTrack.AppHost/AssTrack.AppHost.csproj --configuration Release --no-build > apphost.log 2>&1 &
          APPHOST_PID=$!
          trap 'kill $APPHOST_PID 2>/dev/null || true; cat apphost.log' EXIT

          READY=0
          for attempt in {1..120}; do
            if curl -fsS http://127.0.0.1:5019/healthz/live >/dev/null && curl -fsS http://127.0.0.1:5174 >/dev/null; then
              READY=1
              break
            fi
            if ! kill -0 "$APPHOST_PID" 2>/dev/null; then
              cat apphost.log
              exit 1
            fi
            sleep 1
          done
          if [ "$READY" -ne 1 ]; then
            echo "AppHost did not become ready in time"
            exit 1
          fi

          E2E_STARTUP_MODE=External \
          E2E_BACKEND_PORT=5019 \
          E2E_FRONTEND_PORT=5174 \
          dotnet test tests/AssTrack.E2ETests/AssTrack.E2ETests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=e2e-apphost-tests.trx"
        env:
          ASSTRACK_API_KEY: e2e-test-key
          ASSTRACK_CONNECTION_STRING: Data Source=/tmp/asstrack_apphost_e2e.db

      - name: Upload AppHost E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-apphost-test-results
          path: |
            tests/**/TestResults/**/*.trx
            apphost.log

  e2e-production:
    name: E2E Production Publish
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore .NET
        run: dotnet restore AssTrack.sln

      - name: Publish integrated production app
        run: dotnet publish src/AssTrack.Api/AssTrack.Api.csproj --configuration Release --no-restore --output artifacts/production-app /p:ContinuousIntegrationBuild=true

      - name: Build E2E tests
        run: dotnet build tests/AssTrack.E2ETests/AssTrack.E2ETests.csproj --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Install Playwright Chromium
        run: pwsh tests/AssTrack.E2ETests/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Run E2E tests against production publish
        shell: bash
        run: |
          set -euo pipefail
          (cd artifacts/production-app && dotnet AssTrack.Api.dll) > production-app.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null || true; cat production-app.log' EXIT

          READY=0
          for attempt in {1..90}; do
            if curl -fsS http://127.0.0.1:5099/healthz/live >/dev/null && curl -fsS http://127.0.0.1:5099 >/dev/null; then
              READY=1
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              cat production-app.log
              exit 1
            fi
            sleep 1
          done
          if [ "$READY" -ne 1 ]; then
            echo "Production app did not become ready in time"
            exit 1
          fi

          E2E_STARTUP_MODE=External \
          E2E_BACKEND_PORT=5099 \
          E2E_FRONTEND_PORT=5099 \
          dotnet test tests/AssTrack.E2ETests/AssTrack.E2ETests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=e2e-production-tests.trx"
        env:
          ASPNETCORE_ENVIRONMENT: Production
          ASPNETCORE_URLS: http://127.0.0.1:5099
          Auth__ApiKey: e2e-test-key
          Frontend__ApiKey: e2e-test-key
          ConnectionStrings__DefaultConnection: Data Source=/tmp/asstrack_production_e2e.db

      - name: Upload production E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-production-test-results
          path: |
            tests/**/TestResults/**/*.trx
            production-app.log
