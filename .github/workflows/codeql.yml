name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.37.1
        with:
          languages: csharp,javascript-typescript
          queries: security-extended

      - name: Restore
        run: dotnet restore AssTrack.sln

      - name: Build backend
        run: dotnet build AssTrack.sln --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.37.1
