name: Feature Request
description: Suggest an asset tracking, map, alerting, UX, or operations improvement.
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator workflow or user need is not covered today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the desired behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Assets and devices
        - Map experience
        - Geofences
        - Alerts
        - Integrations
        - Bridge gateway
        - Settings and themes
        - Deployment and operations
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional notes on other approaches.
